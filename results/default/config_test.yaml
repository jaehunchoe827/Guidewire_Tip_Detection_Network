backbone: yolo11m
config_name: default
dataset:
  augmentation:
    random_brightness:
      args:
        brightness_factor_range:
        - -0.2
        - 0.2
      probability: 0.3
    random_crop:
      args:
        safe_reigon: 0.1
      probability: 0.3
    random_cutout:
      args:
        cutout_size_range:
        - 0.05
        - 0.2
        max_num_cutouts: 2
      probability: 0.3
    random_elastic_deformation:
      args:
        alpha_range:
        - 0.0
        - 0.002
        sigma: 1.0
      probability: 0.3
    random_gamma:
      args:
        gamma_range:
        - 0.7
        - 1.4
      probability: 0.3
    random_gaussian_noise:
      args:
        sigma_range:
        - 0.0
        - 0.025
      probability: 1.0
    random_gaussian_sharpness:
      args:
        kernel_size: 5
        sigma_range:
        - 0.1
        - 1.5
      probability: 0.3
    random_horizontal_flip:
      args: null
      probability: 0.5
    random_hue_shift:
      args:
        hue_shift_range:
        - -0.05
        - 0.05
      probability: 0.3
    random_mosaic:
      args:
        max_num_mosaics: 2
        mosaic_size_range:
        - 0.05
        - 0.2
      probability: 0.3
    random_motion_blur:
      args:
        angle_range:
        - 0.0
        - 180.0
        kernel_size_range:
        - 3
        - 11
      probability: 0.1
    random_perspective:
      args:
        perspective_factor_range:
        - -0.05
        - 0.05
      probability: 0.3
    random_resize:
      args:
        height_range:
        - 0.8
        - 1.2
        width_range:
        - 0.8
        - 1.2
      probability: 0.3
    random_rotation:
      args:
        angle_range:
        - -0.7854
        - 0.7854
      probability: 0.5
    random_saturation:
      args:
        saturation_factor_range:
        - 0.8
        - 1.2
      probability: 0.3
    random_scale_intensity:
      args:
        scale_factor_range:
        - 0.8
        - 1.2
      probability: 0.3
    random_shear:
      args:
        shear_x_range:
        - -0.05
        - 0.05
        shear_y_range:
        - -0.05
        - 0.05
      probability: 0.3
    random_vertical_flip:
      args: null
      probability: 0.5
  heatmap_sigma: 4.0
  image_initial_resize_ratio: 0.8
  sigma_xray_noise: 0.0125
  split_ratio:
  - 0.8
  - 0.1
  - 0.1
from_logits: true
network:
  head:
    edge_assist: true
    num_hidden_channels: 96
    use_se: true
    version: ver3
  input_image_shape:
  - 640
  - 640
training:
  accumulate: 3
  batch_size: 8
  epochs: 40
  loss_main:
  - bce
  - mse
  loss_weights:
    bce: 0.9
    mse: 0.1
  lr_scheduler:
    args:
      max_lr: 0.003
      min_lr: 3.0e-06
      warmup_epochs: 1.5
    name: CosineLR
  max_grad_norm: 10.0
  optimizer:
    args: null
    name: AdamW
    weight_decay: 0.0001
  unfreeze_backbone_epochs: 4
